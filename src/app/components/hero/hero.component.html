<section class="relative min-h-screen flex items-center justify-center overflow-hidden pt-20">
  <!-- Background -->
  <div class="absolute inset-0 bg-cover bg-center bg-no-repeat" [style.background-image]="'url(' + galaxyBg + ')'">
    <div class="absolute inset-0 bg-gradient-to-b from-background/60 via-background/80 to-background"></div>
  </div>

  <!-- Floating Star Particles -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    @for (star of stars; track star.id) {
      <svg
        class="absolute animate-twinkle text-amber-100 drop-shadow-[0_0_6px_rgba(255,251,235,0.9)]"
        [style.left.%]="star.x"
        [style.top.%]="star.y"
        [style.width.px]="star.size"
        [style.height.px]="star.size"
        [style.animationDelay.s]="star.delay"
        [style.animationDuration.s]="star.duration"
        [attr.viewBox]="'0 0 24 24'"
        style="transform: translate(-50%, -50%);">
        <path
          fill="currentColor"
          d="M12 2l2.5 7.5L22 12l-7.5 2.5L12 22l-2.5-7.5L2 12l7.5-2.5L12 2z"/>
      </svg>
    }
  </div>

  <!-- Zodiac Circle - Left Side -->
  <div
    class="absolute left-10 top-1/2 -translate-y-1/2 w-[400px] h-[400px] opacity-30 animate-[spin_60s_linear_infinite] hidden xl:block">
    <!-- <img [src]="zodiacCircle" alt="" class="w-full h-full object-contain" /> -->
  </div>

  <!-- Hero Content -->
  <div class="relative z-10 container mx-auto px-4">
    <div class="max-w-4xl mx-auto text-center">
      <div>
        <!-- Main Logo - Gentle float -->
        <div class="mb-6 flex justify-center animate-float-gentle">
          <div class="relative">
            <div class="absolute inset-0 bg-primary/20 rounded-full blur-3xl animate-pulse-glow -z-10"></div>
            <img [src]="mainLogo" alt="Bhavishyat" class="max-w-[504px] md:max-w-[720px] lg:max-w-[900px] w-full h-auto object-contain relative" />
          </div>
        </div>

        <h2 class="text-3xl md:text-5xl lg:text-6xl font-playfair font-bold mb-6 animate-fade-in-up" style="animation-delay: 0.2s;">
          <span class="bg-gradient-to-r from-foreground via-primary to-accent bg-clip-text text-transparent">
            Ultimate Guide To Astrology
          </span>
        </h2>

        <p class="text-lg md:text-xl text-foreground/80 mb-8 max-w-3xl mx-auto leading-relaxed animate-fade-in-up" style="animation-delay: 0.4s;">
          Where ancient Vedic wisdom illuminates your path. Decode your birth chart, embrace your cosmic story, and discover the destiny written in the stars.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center animate-fade-in-up" style="animation-delay: 0.6s;">
          <app-button size="lg"
            className="bg-gradient-to-r from-primary to-accent hover:opacity-90 text-primary-foreground font-semibold px-8 py-6 text-lg shadow-[0_0_30px_rgba(234,147,85,0.4)] transition-all duration-300 group min-w-[180px] sm:min-w-[200px]">
            <span class="inline-block">Learn More</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="ml-2 inline-block group-hover:translate-x-1 transition-transform">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </app-button>
          <app-button size="lg" variant="outline"
            className="border-2 border-primary text-primary hover:bg-primary/10 font-semibold px-8 py-6 text-lg min-w-[180px] sm:min-w-[200px]">
            Explore Services
          </app-button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Decorative Element -->
  <div class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-background to-transparent"></div>
</section>
