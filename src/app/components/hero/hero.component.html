<section class="relative min-h-screen flex items-center justify-center overflow-hidden pt-20">
  <!-- Background -->
  <div class="absolute inset-0 bg-cover bg-center bg-no-repeat" [style.background-image]="'url(' + galaxyBg + ')'">
    <div class="absolute inset-0 bg-gradient-to-b from-background/60 via-background/80 to-background"></div>
  </div>

  <!-- Floating Star Particles -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    @for (star of stars; track star.id) {
      <svg
        class="absolute animate-twinkle text-amber-100 drop-shadow-[0_0_6px_rgba(255,251,235,0.9)]"
        [style.left.%]="star.x"
        [style.top.%]="star.y"
        [style.width.px]="star.size"
        [style.height.px]="star.size"
        [style.animationDelay.s]="star.delay"
        [style.animationDuration.s]="star.duration"
        [attr.viewBox]="'0 0 24 24'"
        style="transform: translate(-50%, -50%);">
        <path
          fill="currentColor"
          d="M12 2l2.5 7.5L22 12l-7.5 2.5L12 22l-2.5-7.5L2 12l7.5-2.5L12 2z"/>
      </svg>
    }
  </div>

  <!-- Zodiac Circle - Left Side -->
  <div
    class="absolute left-10 top-1/2 -translate-y-1/2 w-[400px] h-[400px] opacity-30 animate-[spin_60s_linear_infinite] hidden xl:block">
    <!-- <img [src]="zodiacCircle" alt="" class="w-full h-full object-contain" /> -->
  </div>

  <!-- Hero Content -->
  <div class="relative z-10 container mx-auto px-4 -translate-y-[10vh] lg:-translate-y-[2vh]">
    <div class="max-w-4xl mx-auto text-center">
      <div>
        <!-- Brand Name: soft glow + gradient text; mobile + web sizes -->
        <div class="mb-1 md:mb-2 flex justify-center max-md:py-2 md:py-4 lg:py-5 w-full min-w-0 max-md:px-2">
          <div
            class="relative isolate flex w-full min-w-0 justify-center max-md:max-w-[min(100%,calc(100vw-2rem))] max-md:px-0 px-1 sm:px-2">
            <!-- Ambient halo behind wordmark (does not replace text; for decoration only) -->
            <div
              aria-hidden="true"
              class="pointer-events-none absolute left-1/2 top-[52%] z-0 -translate-x-1/2 -translate-y-1/2 w-[min(106%,38rem)] max-w-[min(100%,calc(100vw-2rem))] h-14 max-md:h-[min(3.8rem,13vw)] md:h-20 lg:h-24 rounded-full bg-gradient-to-r from-primary/34 via-accent/26 to-primary/34 blur-[14px] md:blur-[22px] lg:blur-[28px] opacity-45 md:opacity-[0.5]"></div>
            <img
              [src]="mainLogo"
              alt="Bhavishyat"
              class="relative z-10 block w-full max-w-[min(100%,52rem)] md:max-w-[56rem] lg:max-w-[62rem] h-auto object-contain max-md:[filter:drop-shadow(0_0_12px_rgba(234,147,85,0.5))_drop-shadow(0_0_28px_rgba(234,147,85,0.28))_drop-shadow(0_0_52px_rgba(234,147,85,0.16))] md:[filter:drop-shadow(0_0_18px_rgba(234,147,85,0.52))_drop-shadow(0_0_44px_rgba(234,147,85,0.32))_drop-shadow(0_0_88px_rgba(234,147,85,0.2))]"
            />
          </div>
        </div>

        <h2 class="text-2xl max-md:leading-snug md:text-5xl lg:text-6xl font-playfair font-bold mb-4 md:mb-6 animate-fade-in-up" style="animation-delay: 0.2s;">
          <span class="bg-gradient-to-r from-foreground via-primary to-accent bg-clip-text text-transparent">
            Ultimate Guide To Astrology
          </span>
        </h2>

        <p class="text-sm md:text-xl text-foreground/75 md:text-foreground/80 mb-5 md:mb-6 max-w-3xl mx-auto leading-relaxed animate-fade-in-up" style="animation-delay: 0.4s;">
          Where ancient Vedic wisdom illuminates your path. Decode your birth chart, embrace your cosmic story, and discover the destiny written in the stars.
        </p>

        <a href="#services" class="inline-block mb-6 sm:mb-8 animate-fade-in-up" style="animation-delay: 0.5s;">
          <app-button size="lg"
            className="bg-gradient-to-r from-primary to-accent hover:opacity-90 text-primary-foreground font-semibold px-6 py-3 text-sm sm:px-8 sm:py-4 sm:text-base shadow-[0_0_20px_rgba(234,147,85,0.3)] transition-all duration-300">
            Lets Explore
          </app-button>
        </a>

        <div class="hidden sm:flex lg:hidden flex-row gap-2 sm:gap-4 justify-center items-stretch sm:items-center animate-fade-in-up w-full sm:w-auto max-w-md sm:max-w-none mx-auto" style="animation-delay: 0.6s;">
          <app-button size="lg" (click)="handleLearnWithUsClick($event)"
            className="bg-gradient-to-r from-primary to-accent hover:opacity-90 text-primary-foreground font-semibold px-3 py-2 text-xs sm:px-8 sm:py-6 sm:text-lg shadow-[0_0_30px_rgba(234,147,85,0.4)] transition-all duration-300 group flex-1 sm:flex-initial min-w-0 sm:min-w-[180px] sm:min-w-[200px]">
            <span class="inline-block">Gurukul</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 sm:w-5 sm:h-5" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="ml-2 inline-block group-hover:translate-x-1 transition-transform shrink-0">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </app-button>
          <a href="#services" class="flex-1 sm:flex-initial min-w-0 block">
            <app-button size="lg" variant="outline"
              className="border-2 border-primary text-primary hover:bg-primary/10 font-semibold px-3 py-2 text-xs sm:px-8 sm:py-6 sm:text-lg w-full sm:w-auto min-w-0">
              Explore Services
            </app-button>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Decorative Element -->
  <div class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-background to-transparent"></div>
</section>
